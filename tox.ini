[tox]
skipsdist = true
envlist = py310, py311

[gh-actions]
python =
    3.10: py310
    3.11: py311
    
[testenv]
passenv = PYTHON_VERSION
allowlist_externals = poetry
commands =
    poetry install -v
    pytest --pyargs metatracker --cov --cov-config=pyproject.toml --cov-report=xml --log-level=INFO
    poetry run pre-commit run --all-files
